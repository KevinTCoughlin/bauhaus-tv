name: Nightly Build

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * *'  # 6 AM UTC — after daily generation completes

concurrency:
  group: nightly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  check-nightly:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - name: Compare SHA to last nightly
        id: check
        run: |
          LAST=$(gh release view nightly-build --repo ${{ github.repository }} --json targetCommitish -q .targetCommitish 2>/dev/null || echo "none")
          echo "changed=$([ "$LAST" != "${{ github.sha }}" ] && echo true || echo false)" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: check-nightly
    if: needs.check-nightly.outputs.changed == 'true' || github.event_name == 'schedule'
    name: Build (tvOS Simulator)
    runs-on: macos-15
    outputs:
      sha_short: ${{ steps.sha.outputs.short }}
      date: ${{ steps.date.outputs.date }}

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer

      - name: Get short SHA
        id: sha
        run: echo "short=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Get current date
        id: date
        run: echo "date=$(date -u +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Build (tvOS Simulator)
        run: |
          xcodebuild build \
            -project Bauhaus.xcodeproj \
            -scheme Bauhaus \
            -sdk appletvsimulator \
            -destination 'platform=tvOS Simulator,name=Apple TV 4K (3rd generation)' \
            -derivedDataPath DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Package simulator app
        run: |
          APP=$(find DerivedData -name "Bauhaus.app" -not -path "*/Index.noindex/*" | head -1)
          zip -r "Bauhaus-tvOS-simulator-${{ steps.sha.outputs.short }}.zip" "$APP"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Bauhaus-tvOS-simulator-${{ github.sha }}
          path: Bauhaus-tvOS-simulator-*.zip
          retention-days: 7

  release:
    needs: [check-nightly, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Bauhaus-tvOS-simulator-${{ github.sha }}
          path: artifacts

      - name: Update nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly-build
          token: ${{ secrets.GITHUB_TOKEN }}
          name: "Nightly Build (${{ needs.build.outputs.date }})"
          body: |
            ## Nightly Build

            **Commit:** ${{ github.sha }}
            **Date:** ${{ needs.build.outputs.date }}

            ### Download
            | File | Description |
            |------|-------------|
            | `Bauhaus-tvOS-simulator-*.zip` | Simulator build (.app bundle, unsigned) |

            ### Install on Simulator
            1. Download and unzip
            2. Boot an Apple TV simulator in Xcode
            3. `xcrun simctl install booted Bauhaus.app`
            4. `xcrun simctl launch booted com.cascadiacollections.bauhaus-tv`

            ---
            _Replaced automatically on each commit to main._
          files: artifacts/*.zip
          prerelease: true
          make_latest: false
        continue-on-error: true
